<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hic Sunt Dracones — Un dato de historia cada día</title>
<meta name="description" content="Hic Sunt Dracones: una efeméride histórica cada día. Donde los mapas terminan, comienza la historia.">
<meta name="theme-color" content="#2a1f0e">

<!-- Open Graph / compartir en redes -->
<meta property="og:type" content="website">
<meta property="og:title" content="Hic Sunt Dracones">
<meta property="og:description" content="Donde los mapas terminan, comienza la historia · Un dato de historia cada día.">
<meta property="og:url" content="https://draconum.app">
<meta property="og:locale" content="es_ES">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Hic Sunt Dracones">
<meta name="twitter:description" content="Donde los mapas terminan, comienza la historia · Un dato de historia cada día.">

<!-- Favicon: brújula en SVG, sin pesos externos -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%232a1f0e'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='%239a7230'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment: #f2e8d5;
    --ink: #1c1208;
    --ink-faded: #4a3820;
    --ink-muted: #7a6045;
    --red-wax: #8b2020;
    --gold: #9a7230;
    --border-col: #b89a6a;
    --card-bg: #faf3e3;
  }

  body {
    background-color: #2a1f0e;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(100,70,30,0.08) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(100,70,30,0.05) 40px);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: 'EB Garamond', Georgia, serif;
  }

  .wrapper {
    max-width: 680px;
    width: 100%;
  }

  .masthead {
    text-align: center;
    margin-bottom: 2rem;
  }

  .masthead-rule {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.75rem;
  }

  .masthead-rule::before,
  .masthead-rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-col);
  }

  .compass {
    font-size: 1.6rem;
    color: var(--gold);
    line-height: 1;
  }

  .title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 600;
    color: var(--parchment);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .subtitle {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--border-col);
    font-size: 0.95rem;
    margin-top: 0.3rem;
  }

  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border-col);
    border-radius: 2px;
    padding: 2.5rem 2.5rem 2rem;
    position: relative;
    box-shadow: 0 0 0 4px rgba(184,154,106,0.15), 0 8px 32px rgba(0,0,0,0.5);
    min-height: 260px;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(184,154,106,0.3);
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.7;
  }
  .corner-tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  .date-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .date-pill {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--red-wax);
    border: 1px solid var(--red-wax);
    padding: 3px 10px;
    border-radius: 2px;
  }

  .category-tag {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.88rem;
    color: var(--ink-muted);
  }

  .fact-headline {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.1rem, 3vw, 1.45rem);
    font-weight: 600;
    color: var(--ink);
    line-height: 1.35;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border-col);
  }

  .fact-body {
    font-size: 1.08rem;
    line-height: 1.8;
    color: var(--ink-faded);
    margin-bottom: 1.5rem;
  }

  .fact-body em {
    color: var(--red-wax);
    font-style: italic;
  }

  .source-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 1rem;
    border-top: 1px solid var(--border-col);
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .source-label {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-muted);
  }

  .nav-row {
    display: flex;
    gap: 0.5rem;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border-col);
    color: var(--ink-faded);
    font-family: 'EB Garamond', serif;
    font-size: 0.88rem;
    padding: 4px 14px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, color 0.15s;
  }

  .nav-btn:hover {
    background: var(--ink);
    color: var(--parchment);
    border-color: var(--ink);
  }

  .nav-btn:disabled {
    opacity: 0.35;
    cursor: default;
  }

  .nav-btn:disabled:hover {
    background: none;
    color: var(--ink-faded);
    border-color: var(--border-col);
  }

  .today-badge {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--red-wax);
    color: var(--parchment);
    padding: 3px 8px;
    border-radius: 2px;
  }

  .today-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--red-wax);
    color: var(--red-wax);
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, color 0.15s;
  }

  .today-btn:hover {
    background: var(--red-wax);
    color: var(--parchment);
  }

  .progress-bar {
    margin-top: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .dots-track {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .dots-counter {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--border-col);
    opacity: 0.75;
  }

  .progress-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border-col);
    opacity: 0.4;
    transition: opacity 0.2s;
    cursor: pointer;
    border: none;
    padding: 0;
  }

  .progress-dot.active {
    background: var(--red-wax);
    opacity: 1;
  }

  .footer {
    text-align: center;
    margin-top: 1.25rem;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.82rem;
    color: var(--border-col);
    opacity: 0.7;
  }

  .state-msg {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--ink-muted);
    text-align: center;
    padding: 3rem 0;
  }

  /* Foco visible y de marca para navegación con teclado */
  .nav-btn:focus-visible,
  .today-btn:focus-visible,
  .progress-dot:focus-visible {
    outline: 2px solid var(--red-wax);
    outline-offset: 2px;
  }

  .progress-dot[aria-current="true"] {
    outline: 1px solid var(--red-wax);
    outline-offset: 2px;
  }

  /* Respeta a quien prefiere menos movimiento */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition: none !important;
      animation: none !important;
    }
    html { scroll-behavior: auto; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="masthead">
    <div class="masthead-rule">
      <span class="compass">✦</span>
    </div>
    <div class="title">Hic Sunt Dracones</div>
    <div class="subtitle">Donde los mapas terminan, comienza la historia · Un dato cada día</div>
  </div>

  <div class="card" id="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div id="content" aria-live="polite" aria-atomic="true" tabindex="-1">
      <div class="state-msg">Desplegando velas...</div>
    </div>
  </div>

  <nav class="progress-bar" id="dots" aria-label="Navegación de crónicas"></nav>

  <div class="footer">
    Navega por el archivo · Solo se muestran las crónicas hasta hoy
  </div>
</div>

<script>
  // ---- CONFIGURACIÓN DE SUPABASE ----
  const SUPABASE_URL = "https://cbmzxibsbftrdrbedloj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_fvf0-ABfk_SMiSwFbzU7Iw_zVA1_aLM";
  // ------------------------------------

  let chronicles = [];
  let idx = 0;

  async function loadChronicles() {
    document.getElementById('content').innerHTML =
      '<div class="state-msg">Desplegando velas...</div>';
    try {
      const today = todayISO();
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/chronicles?select=*&active=eq.true&event_date=lte.${today}&order=event_date.asc`,
        {
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
          }
        }
      );

      if (!res.ok) throw new Error("Error de red: " + res.status);

      chronicles = await res.json();

      if (!chronicles.length) {
        document.getElementById('content').innerHTML =
          '<div class="state-msg">No hay crónicas disponibles todavía.</div>';
        return;
      }

      // Si la URL apunta a una fecha concreta (#YYYY-MM-DD) la abrimos;
      // si no, arrancamos en la más reciente (la de hoy, si existe).
      const fromHash = location.hash.slice(1);
      const hashIdx = fromHash ? chronicles.findIndex(c => c.event_date === fromHash) : -1;
      idx = hashIdx >= 0 ? hashIdx : chronicles.length - 1;
      render();
    } catch (err) {
      document.getElementById('content').innerHTML =
        '<div class="state-msg">No se pudo contactar con el archivo. Revisa la conexión.' +
        '<br><button class="nav-btn" style="margin-top:1rem" onclick="loadChronicles()">Reintentar</button></div>';
      console.error(err);
    }
  }

  function todayISO() {
    const d = new Date();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${d.getFullYear()}-${m}-${day}`;
  }

  function formatDate(iso) {
    // Parseamos la fecha de la crónica (YYYY-MM-DD) sin desfase de zona horaria
    const d = iso ? new Date(iso + 'T00:00:00') : new Date();
    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
  }

  // Evita XSS: escapa cualquier HTML que venga de los datos.
  function escapeHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // El cuerpo permite solo cursivas: escapamos todo y restauramos <em>.
  function renderBody(s) {
    return escapeHtml(s)
      .replace(/&lt;em&gt;/g, '<em>')
      .replace(/&lt;\/em&gt;/g, '</em>');
  }

  // Índice de la efeméride "de hoy": la del día actual si existe,
  // si no la más reciente del archivo.
  function todayIdx() {
    const i = chronicles.findIndex(c => c.event_date === todayISO());
    return i >= 0 ? i : chronicles.length - 1;
  }

  function render() {
    const c = chronicles[idx];
    const isToday = c.event_date === todayISO();
    const onToday = idx === todayIdx();

    document.getElementById('content').innerHTML = `
      <div class="date-row">
        <span class="date-pill">${formatDate(c.event_date)}</span>
        ${isToday ? '<span class="today-badge">Hoy</span>' : ''}
        <span class="category-tag">${escapeHtml(c.category)}</span>
        ${onToday ? '' : '<button class="today-btn" onclick="goToday()">Volver a hoy</button>'}
      </div>
      <div class="fact-headline">${escapeHtml(c.title)}</div>
      <div class="fact-body">${renderBody(c.body)}</div>
      <div class="source-row">
        <span class="source-label">${escapeHtml(c.source)}</span>
        <div class="nav-row">
          <button class="nav-btn share-btn" onclick="share()" aria-label="Compartir esta efeméride">Compartir</button>
          <button class="nav-btn" onclick="goRandom()" aria-label="Ir a una efeméride al azar">Aleatoria</button>
          <button class="nav-btn" onclick="prev()" ${idx === 0 ? 'disabled' : ''} aria-label="Efeméride anterior">&larr; Anterior</button>
          <button class="nav-btn" onclick="next()" ${idx === chronicles.length - 1 ? 'disabled' : ''} aria-label="Efeméride siguiente">Siguiente &rarr;</button>
        </div>
      </div>
    `;

    renderDots();
    updateHash();
  }

  // Muestra solo una ventana de puntos alrededor del actual + contador,
  // para que la barra no se rompa con cientos de crónicas.
  function renderDots() {
    const total = chronicles.length;
    const WINDOW = 15;
    let start = Math.max(0, idx - Math.floor(WINDOW / 2));
    let end = Math.min(total, start + WINDOW);
    start = Math.max(0, end - WINDOW);

    let dots = '';
    for (let i = start; i < end; i++) {
      const cur = i === idx;
      dots += `<button class="progress-dot${cur ? ' active' : ''}" onclick="goTo(${i})"${cur ? ' aria-current="true"' : ''} aria-label="Crónica ${i + 1} de ${total}"></button>`;
    }
    document.getElementById('dots').innerHTML =
      `<div class="dots-track">${dots}</div><div class="dots-counter">${idx + 1} / ${total}</div>`;
  }

  function updateHash() {
    const ev = chronicles[idx] && chronicles[idx].event_date;
    if (ev) history.replaceState(null, '', '#' + ev);
  }

  // Tras navegar por acción del usuario, devolvemos el foco a la tarjeta
  // para que el teclado no se pierda al destruirse el botón pulsado.
  function focusContent() {
    document.getElementById('content').focus({ preventScroll: true });
  }

  function next() {
    if (idx < chronicles.length - 1) { idx++; render(); focusContent(); }
  }

  function prev() {
    if (idx > 0) { idx--; render(); focusContent(); }
  }

  function goTo(i) {
    if (i === idx) return;
    idx = i;
    render();
    focusContent();
  }

  function goToday() {
    idx = todayIdx();
    render();
    focusContent();
  }

  function goRandom() {
    if (chronicles.length < 2) return;
    let r;
    do { r = Math.floor(Math.random() * chronicles.length); } while (r === idx);
    idx = r;
    render();
    focusContent();
  }

  // Compartir: usa el diálogo nativo si existe; si no, copia el enlace.
  async function share() {
    const c = chronicles[idx];
    const url = location.origin + location.pathname + '#' + c.event_date;
    try {
      if (navigator.share) {
        await navigator.share({ title: 'Hic Sunt Dracones', text: c.title, url });
        return;
      }
      await navigator.clipboard.writeText(url);
      flashShare('¡Enlace copiado!');
    } catch (err) {
      if (err && err.name === 'AbortError') return; // el usuario canceló
      try { await navigator.clipboard.writeText(url); flashShare('¡Enlace copiado!'); }
      catch (_) { flashShare('No se pudo copiar'); }
    }
  }

  function flashShare(msg) {
    const btn = document.querySelector('.share-btn');
    if (!btn) return;
    const original = btn.textContent;
    btn.textContent = msg;
    btn.disabled = true;
    setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1500);
  }

  // Navegación con teclado: flechas, e inicio/fin del archivo
  document.addEventListener('keydown', (e) => {
    if (!chronicles.length) return;
    if (e.key === 'ArrowLeft') prev();
    else if (e.key === 'ArrowRight') next();
    else if (e.key === 'Home') { e.preventDefault(); goTo(0); }
    else if (e.key === 'End') { e.preventDefault(); goToday(); }
  });

  // Navegación con gestos (swipe) en móvil
  let touchX = null;
  const cardEl = document.getElementById('card');
  cardEl.addEventListener('touchstart', (e) => { touchX = e.changedTouches[0].clientX; }, { passive: true });
  cardEl.addEventListener('touchend', (e) => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) { dx < 0 ? next() : prev(); }
    touchX = null;
  });

  // Permite navegar editando el hash de la URL (o atrás/adelante del navegador)
  window.addEventListener('hashchange', () => {
    const ev = location.hash.slice(1);
    const i = chronicles.findIndex(c => c.event_date === ev);
    if (i >= 0 && i !== idx) { idx = i; render(); }
  });

  loadChronicles();
</script>
</body>
</html>
