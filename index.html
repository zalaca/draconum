<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hic Sunt Dracones — Un dato de historia cada día</title>
<meta name="description" content="Hic Sunt Dracones: una efeméride histórica cada día. Donde los mapas terminan, comienza la historia.">
<meta name="theme-color" content="#2a1f0e">

<!-- Open Graph / compartir en redes -->
<meta property="og:type" content="website">
<meta property="og:title" content="Hic Sunt Dracones">
<meta property="og:description" content="Donde los mapas terminan, comienza la historia · Un dato de historia cada día.">
<meta property="og:url" content="https://draconum.app">
<meta property="og:locale" content="es_ES">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Hic Sunt Dracones">
<meta name="twitter:description" content="Donde los mapas terminan, comienza la historia · Un dato de historia cada día.">
<meta property="og:image" content="https://draconum.app/og.png">
<meta name="twitter:image" content="https://draconum.app/og.png">

<!-- Favicon -->
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">

<!-- PWA -->
<link rel="manifest" href="/manifest.json">

<!-- Mapa (Leaflet + OpenStreetMap) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment: #f2e8d5;
    --ink: #1c1208;
    --ink-faded: #4a3820;
    --ink-muted: #7a6045;
    --red-wax: #8b2020;
    --gold: #9a7230;
    --border-col: #b89a6a;
    --card-bg: #faf3e3;
  }

  body {
    background-color: #2a1f0e;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(100,70,30,0.08) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(100,70,30,0.05) 40px);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: 'EB Garamond', Georgia, serif;
  }

  .wrapper {
    max-width: 680px;
    width: 100%;
  }

  .masthead {
    text-align: center;
    margin-bottom: 2rem;
  }

  .masthead-rule {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.75rem;
  }

  .masthead-rule::before,
  .masthead-rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-col);
  }

  .compass {
    font-size: 1.6rem;
    color: var(--gold);
    line-height: 1;
  }

  .title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 600;
    color: var(--parchment);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .subtitle {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--border-col);
    font-size: 0.95rem;
    margin-top: 0.3rem;
  }

  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border-col);
    border-radius: 2px;
    padding: 2.5rem 2.5rem 2rem;
    position: relative;
    box-shadow: 0 0 0 4px rgba(184,154,106,0.15), 0 8px 32px rgba(0,0,0,0.5);
    min-height: 260px;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(184,154,106,0.3);
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.7;
  }
  .corner-tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  .date-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .date-pill {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--red-wax);
    border: 1px solid var(--red-wax);
    padding: 3px 10px;
    border-radius: 2px;
  }

  .category-tag {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.88rem;
    color: var(--ink-muted);
  }

  .fact-headline {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.1rem, 3vw, 1.45rem);
    font-weight: 600;
    color: var(--ink);
    line-height: 1.35;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border-col);
  }

  .fact-body {
    font-size: 1.08rem;
    line-height: 1.8;
    color: var(--ink-faded);
    margin-bottom: 1.5rem;
  }

  .fact-body em {
    color: var(--red-wax);
    font-style: italic;
  }

  .source-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 1rem;
    border-top: 1px solid var(--border-col);
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .source-label {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-muted);
  }

  .nav-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border-col);
    color: var(--ink-faded);
    font-family: 'EB Garamond', serif;
    font-size: 0.88rem;
    padding: 4px 14px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, color 0.15s;
  }

  .nav-btn:hover {
    background: var(--ink);
    color: var(--parchment);
    border-color: var(--ink);
  }

  .nav-btn:disabled {
    opacity: 0.35;
    cursor: default;
  }

  .nav-btn:disabled:hover {
    background: none;
    color: var(--ink-faded);
    border-color: var(--border-col);
  }

  .today-badge {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--red-wax);
    color: var(--parchment);
    padding: 3px 8px;
    border-radius: 2px;
  }

  .today-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--red-wax);
    color: var(--red-wax);
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, color 0.15s;
  }

  .today-btn:hover {
    background: var(--red-wax);
    color: var(--parchment);
  }

  .progress-bar {
    margin-top: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .dots-track {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .dots-counter {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--border-col);
    opacity: 0.75;
  }

  .progress-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border-col);
    opacity: 0.4;
    transition: opacity 0.2s;
    cursor: pointer;
    border: none;
    padding: 0;
  }

  .progress-dot.active {
    background: var(--red-wax);
    opacity: 1;
  }

  .footer {
    text-align: center;
    margin-top: 1.25rem;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.82rem;
    color: var(--border-col);
    opacity: 0.7;
  }

  .state-msg {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--ink-muted);
    text-align: center;
    padding: 3rem 0;
  }

  .busy-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(250, 243, 227, 0.85);
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--ink-muted);
    z-index: 2;
    border-radius: 2px;
  }

  .busy-overlay[hidden] { display: none; }

  .date-jump {
    margin-top: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .date-jump-label {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--border-col);
  }

  .date-jump-input {
    font-family: 'EB Garamond', serif;
    font-size: 0.9rem;
    color: var(--parchment);
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border-col);
    border-radius: 2px;
    padding: 7px 10px;
    min-height: 40px;        /* zona táctil cómoda en móvil */
    color-scheme: dark;      /* calendario nativo legible sobre fondo oscuro */
    cursor: pointer;
  }

  .date-jump-input:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  .streak {
    text-align: center;
    margin-top: 0.9rem;
    min-height: 1em;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: var(--gold);
  }

  /* ---- Mapa ---- */
  .minimap {
    height: 200px;
    margin-top: 1.25rem;
    border: 1px solid var(--border-col);
    border-radius: 2px;
  }

  .minimap[hidden] { display: none; }

  /* Aspecto pergamino: filtro por tesela (no sobre el panel, que provoca
     parpadeos/desapariciones al hacer pan/zoom). No afecta a pines/controles. */
  .minimap .leaflet-tile,
  #exploreMap .leaflet-tile {
    filter: sepia(0.6) saturate(0.85) contrast(0.95) brightness(1.02);
  }

  .map-launch {
    text-align: center;
    margin-top: 1rem;
  }

  .map-btn {
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .map-btn:hover { background: var(--gold); color: var(--card-bg); }

  .map-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .map-modal {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    background: #2a1f0e;
  }

  .map-modal[hidden] { display: none; }

  .map-modal-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border-col);
    color: var(--parchment);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .explore-map { flex: 1; }

  .map-popup-btn {
    margin-top: 6px;
    background: var(--red-wax);
    color: var(--parchment);
    border: none;
    border-radius: 2px;
    padding: 4px 12px;
    font-family: 'EB Garamond', serif;
    font-size: 0.85rem;
    cursor: pointer;
  }

  /* Pin estilo sello de lacre. El <span> interno es el círculo visible;
     los pines de ruta colorean el fondo en línea con el color de su ruta. */
  .map-pin span {
    display: block;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--red-wax);
    border: 2px solid var(--card-bg);
    box-shadow: 0 0 0 1px var(--gold), 0 2px 5px rgba(0, 0, 0, 0.55);
    box-sizing: border-box;
    transition: transform 0.12s;
  }

  .map-pin:hover span { transform: scale(1.25); }

  /* Efeméride suelta (fuera de toda ruta): aro hueco, sin relleno */
  .map-pin.hollow span {
    background: transparent;
    border: 2px solid var(--gold);
    box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5), 0 2px 5px rgba(0, 0, 0, 0.45);
  }

  /* Popups en pergamino */
  .leaflet-popup-content-wrapper,
  .leaflet-popup-tip {
    background: var(--card-bg);
    color: var(--ink);
    border: 1px solid var(--border-col);
    border-radius: 2px;
  }

  .leaflet-popup-content {
    font-family: 'EB Garamond', serif;
    color: var(--ink-faded);
  }

  .leaflet-popup-content strong { font-family: 'Cinzel', serif; color: var(--ink); }

  .leaflet-container a.leaflet-popup-close-button { color: var(--ink-muted); }

  /* Foco visible y de marca para navegación con teclado */
  .nav-btn:focus-visible,
  .today-btn:focus-visible,
  .progress-dot:focus-visible {
    outline: 2px solid var(--red-wax);
    outline-offset: 2px;
  }

  .progress-dot[aria-current="true"] {
    outline: 1px solid var(--red-wax);
    outline-offset: 2px;
  }

  /* Respeta a quien prefiere menos movimiento */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition: none !important;
      animation: none !important;
    }
    html { scroll-behavior: auto; }
  }

  /* Ajustes para pantallas pequeñas: evita que los botones se desborden */
  @media (max-width: 540px) {
    body { padding: 1rem 0.6rem; }

    .card { padding: 1.75rem 1.25rem 1.5rem; }

    .source-row { flex-direction: column; align-items: stretch; }

    .nav-row {
      width: 100%;
      justify-content: stretch;
    }

    .nav-row .nav-btn {
      flex: 1 1 auto;
      text-align: center;
      padding: 8px 10px;
      font-size: 0.82rem;
    }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="masthead">
    <div class="masthead-rule">
      <span class="compass">✦</span>
    </div>
    <div class="title">Hic Sunt Dracones</div>
    <div class="subtitle">Donde los mapas terminan, comienza la historia</div>
  </div>

  <div class="card" id="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div id="content" aria-live="polite" aria-atomic="true" tabindex="-1">
      <div class="state-msg">Desplegando velas...</div>
    </div>
    <div id="minimap" class="minimap" aria-label="Mapa del lugar del suceso" hidden></div>
  </div>

  <div class="map-launch">
    <button class="map-btn" onclick="openMap()">✦ Explorar el mapa</button>
  </div>

  <nav class="progress-bar" id="dots" aria-label="Navegación de crónicas"></nav>

  <div class="date-jump">
    <label for="catpick" class="date-jump-label">Saltar a una categoría</label>
    <select id="catpick" class="date-jump-input" aria-label="Saltar a una categoría"></select>
  </div>

  <div class="footer">
    Navega la historia · agrupada por categorías
  </div>
</div>

<div class="map-modal" id="mapModal" role="dialog" aria-label="Mapa de efemérides" hidden>
  <div class="map-modal-bar">
    <span>✦ Explorar el archivo</span>
    <button class="nav-btn" onclick="closeMap()" aria-label="Cerrar mapa">Cerrar ✕</button>
  </div>
  <div id="exploreMap" class="explore-map"></div>
</div>

<script>
  // ---- CONFIGURACIÓN DE SUPABASE ----
  const SUPABASE_URL = "https://cbmzxibsbftrdrbedloj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_fvf0-ABfk_SMiSwFbzU7Iw_zVA1_aLM";
  // ------------------------------------

  const COLS = "event_date,date_label,title,body,source,category,lat,lng,place_name";
  const FETCH_TIMEOUT = 10000;                           // ms antes de abortar

  let chronicles = [];   // todas las efemérides, agrupadas por categoría (lista plana)
  let idx = 0;
  let categories = [];   // nombres de categoría, en orden de 1ª aparición (event_date)
  let byCat = {};        // categoría -> array de sus efemérides (event_date asc)
  let catStart = {};     // categoría -> índice de su primera efeméride en chronicles

  // fetch a Supabase con timeout (evita que la página se quede colgada)
  async function apiFetch(query, withCount, table = 'chronicles') {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), FETCH_TIMEOUT);
    try {
      const headers = {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
      };
      if (withCount) headers["Prefer"] = "count=exact";
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
        headers, signal: ctrl.signal
      });
      if (!res.ok) throw new Error("Error de red: " + res.status);
      return res;
    } finally {
      clearTimeout(timer);
    }
  }

  async function loadChronicles() {
    document.getElementById('content').innerHTML =
      '<div class="state-msg">Desplegando velas...</div>';
    try {
      // Todo el archivo activo, ordenado por event_date (clave de orden interna).
      const res = await apiFetch(`select=${COLS}&active=eq.true&order=event_date.asc`, false);
      const asc = await res.json();
      if (!asc.length) {
        document.getElementById('content').innerHTML =
          '<div class="state-msg">No hay crónicas disponibles todavía.</div>';
        return;
      }

      // Orden de categorías = 1ª aparición (es decir, su event_date más antiguo).
      categories = [];
      byCat = {};
      catStart = {};
      const seen = new Set();
      asc.forEach(c => {
        if (!seen.has(c.category)) { seen.add(c.category); categories.push(c.category); }
        (byCat[c.category] = byCat[c.category] || []).push(c);
      });
      // Lista plana: categorías en orden, cada una con sus efemérides en orden.
      chronicles = [];
      categories.forEach(cat => { catStart[cat] = chronicles.length; chronicles.push(...byCat[cat]); });

      setupCategoryPicker();

      // Posición inicial: deep-link ?d=fecha si lo hay; si no, categoría al azar.
      const fromUrl = new URLSearchParams(location.search).get('d') || location.hash.slice(1);
      const linkIdx = fromUrl ? chronicles.findIndex(c => c.event_date === fromUrl) : -1;
      idx = linkIdx >= 0
        ? linkIdx
        : catStart[categories[Math.floor(Math.random() * categories.length)]];
      render();
    } catch (err) {
      const msg = err && err.name === 'AbortError'
        ? 'La conexión tardó demasiado.'
        : 'No se pudo contactar con el archivo. Revisa la conexión.';
      document.getElementById('content').innerHTML =
        `<div class="state-msg">${msg}` +
        '<br><button class="nav-btn" style="margin-top:1rem" onclick="loadChronicles()">Reintentar</button></div>';
      console.error(err);
    }
  }

  // Rellena el desplegable de categorías (orden alfabético para buscar rápido).
  function setupCategoryPicker() {
    const sel = document.getElementById('catpick');
    if (!sel) return;
    const sorted = [...categories].sort((a, b) => a.localeCompare(b, 'es'));
    sel.innerHTML = sorted.map(cat =>
      `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`
    ).join('');
  }

  function formatDate(iso) {
    // Parseamos la fecha de la crónica (YYYY-MM-DD) sin desfase de zona horaria
    const d = iso ? new Date(iso + 'T00:00:00') : new Date();
    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
  }

  // Evita XSS: escapa cualquier HTML que venga de los datos.
  function escapeHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // El cuerpo permite solo cursivas: escapamos todo y restauramos <em>.
  function renderBody(s) {
    return escapeHtml(s)
      .replace(/&lt;em&gt;/g, '<em>')
      .replace(/&lt;\/em&gt;/g, '</em>');
  }

  function render() {
    const c = chronicles[idx];

    document.getElementById('content').innerHTML = `
      <div class="date-row">
        <span class="date-pill">${escapeHtml(c.date_label || formatDate(c.event_date))}</span>
        <span class="category-tag">${escapeHtml(c.category)}</span>
      </div>
      <div class="fact-headline">${escapeHtml(c.title)}</div>
      <div class="fact-body">${renderBody(c.body)}</div>
      <div class="source-row">
        <span class="source-label">${escapeHtml(c.source)}</span>
        <div class="nav-row">
          <button class="nav-btn share-btn" onclick="share()" aria-label="Compartir esta efeméride">Compartir</button>
          <button class="nav-btn" onclick="randomStory()" aria-label="Ir a una historia al azar">Historia aleatoria</button>
          <button class="nav-btn" onclick="prev()" aria-label="Efeméride anterior">&larr; Anterior</button>
          <button class="nav-btn" onclick="next()" aria-label="Efeméride siguiente">Siguiente &rarr;</button>
        </div>
      </div>
    `;

    renderDots();
    updateUrl();

    // El desplegable refleja la categoría visible
    const sel = document.getElementById('catpick');
    if (sel) sel.value = c.category;

    // Mini-mapa del lugar del suceso (si la crónica tiene coordenadas)
    updateMiniMap(c);
  }

  // ---- Mapa ----
  let miniMap, miniMarker;

  // Recalcula el tamaño del mapa de forma fiable tras mostrar/redimensionar
  // su contenedor (dos frames para que el layout ya esté aplicado).
  function refreshMap(map) {
    requestAnimationFrame(() => requestAnimationFrame(() => map.invalidateSize(false)));
  }

  // Iconos de pin (memoizados por color; se crean con Leaflet ya cargado).
  const ICON_OPTS = { iconSize: [16, 16], iconAnchor: [8, 8], popupAnchor: [0, -10] };
  const sealIcons = {};

  // Sello relleno; si se pasa color, lo usa (color de la ruta).
  function sealIcon(color) {
    const key = color || 'default';
    if (!sealIcons[key]) {
      sealIcons[key] = L.divIcon({
        className: 'map-pin',
        html: color ? `<span style="background:${color}"></span>` : '<span></span>',
        ...ICON_OPTS
      });
    }
    return sealIcons[key];
  }

  // Aro hueco para efemérides sueltas (fuera de cualquier ruta).
  let hollowIcon;
  function standalonePin() {
    if (!hollowIcon) {
      hollowIcon = L.divIcon({ className: 'map-pin hollow', html: '<span></span>', ...ICON_OPTS });
    }
    return hollowIcon;
  }

  // Popup con el titular y un botón para abrir esa efeméride.
  function pointPopup(title, date) {
    return `<strong>${escapeHtml(title)}</strong><br>` +
           `<button class="map-popup-btn" data-date="${escapeHtml(date)}">Leer</button>`;
  }

  // Muestra/actualiza el mini-mapa con el lugar de la crónica actual.
  function updateMiniMap(c) {
    const box = document.getElementById('minimap');
    if (!box) return;
    const hasCoords = window.L && c.lat != null && c.lng != null;
    if (!hasCoords) { box.hidden = true; return; }
    box.hidden = false;
    if (!miniMap) {
      miniMap = L.map(box, {
        scrollWheelZoom: false,
        attributionControl: true,
        fadeAnimation: false   // evita parpadeo/desaparición de teselas
      });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18, attribution: '&copy; OpenStreetMap'
      }).addTo(miniMap);
    }
    miniMap.setView([c.lat, c.lng], 5);
    if (miniMarker) miniMarker.setLatLng([c.lat, c.lng]);
    else miniMarker = L.marker([c.lat, c.lng], { icon: sealIcon() }).addTo(miniMap);
    if (c.place_name) miniMarker.bindPopup(escapeHtml(c.place_name));
    // El contenedor estaba oculto: recalculamos el tamaño del mapa.
    refreshMap(miniMap);
  }

  let exploreMap, mapPointsLoaded = false;

  async function openMap() {
    if (!window.L) return;   // Leaflet no cargó (¿offline?)
    const modal = document.getElementById('mapModal');
    modal.hidden = false;
    document.body.style.overflow = 'hidden';
    if (!exploreMap) {
      // Sin worldCopyJump: las rutas usan longitudes extendidas (fuera de ±180,
      // p. ej. -383) para cruzar el Pacífico/antimeridiano en línea continua;
      // saltar entre copias del mundo las rompía al hacer pan/zoom.
      exploreMap = L.map('exploreMap', { fadeAnimation: false })
        .setView([20, 0], 2);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18, attribution: '&copy; OpenStreetMap'
      }).addTo(exploreMap);
      // Al pulsar "Leer" en un pin, abrimos esa efeméride.
      exploreMap.on('popupopen', (e) => {
        const btn = e.popup.getElement().querySelector('.map-popup-btn');
        if (btn) btn.onclick = () => { closeMap(); openByDate(btn.dataset.date); };
      });
    }
    refreshMap(exploreMap);
    if (!mapPointsLoaded) await loadMapPoints();
  }

  function closeMap() {
    document.getElementById('mapModal').hidden = true;
    document.body.style.overflow = '';
  }

  // Pinta las rutas (polylines + pines de ruta) y las efemérides sueltas.
  async function loadMapPoints() {
    mapPointsLoaded = true;
    try {
      const allLatLng = [];          // para encuadrar el mapa al final
      const onLine = new Set();      // fechas ya representadas en una ruta

      // 1) Rutas (color y nombre) y sus puntos (ordenados por seq). La efeméride
      //    enlazada viene embebida; la RLS oculta las aún no publicadas (futuras).
      const [routes, rpts] = await Promise.all([
        apiFetch('select=id,name,color', false, 'routes').then(r => r.json()),
        apiFetch('select=route_id,seq,lat,lng,chronicle:chronicles(event_date,title)&order=route_id.asc,seq.asc', false, 'route_points').then(r => r.json())
      ]);
      const routeById = {};
      routes.forEach(r => { routeById[r.id] = r; });

      const byRoute = {};
      rpts.forEach(p => { (byRoute[p.route_id] = byRoute[p.route_id] || []).push(p); });

      Object.keys(byRoute).forEach(rid => {
        const pts = byRoute[rid].filter(p => p.lat != null && p.lng != null);
        // Solo dibujamos rutas que ya han empezado (con alguna efeméride publicada).
        if (!pts.some(p => p.chronicle)) return;
        const color = (routeById[rid] && routeById[rid].color) || '#8b2020';

        // Línea de la travesía (todos los puntos, en orden seq)
        const latlngs = pts.map(p => [p.lat, p.lng]);
        L.polyline(latlngs, { color, weight: 2.5, opacity: 0.85, dashArray: '6 6' }).addTo(exploreMap);
        allLatLng.push(...latlngs);

        // Pines solo en los puntos con efeméride publicada
        pts.forEach(p => {
          if (!p.chronicle) return;
          onLine.add(p.chronicle.event_date);
          L.marker([p.lat, p.lng], { icon: sealIcon(color) }).addTo(exploreMap)
            .bindPopup(pointPopup(p.chronicle.title, p.chronicle.event_date));
        });
      });

      // 2) Efemérides con coordenadas que NO están en ninguna línea → aro hueco
      const loose = await apiFetch(
        'select=event_date,title,lat,lng&active=eq.true&lat=not.is.null&limit=5000',
        false
      ).then(r => r.json());
      loose.forEach(p => {
        if (p.lat == null || p.lng == null || onLine.has(p.event_date)) return;
        L.marker([p.lat, p.lng], { icon: standalonePin() }).addTo(exploreMap)
          .bindPopup(pointPopup(p.title, p.event_date));
        allLatLng.push([p.lat, p.lng]);
      });

      // 3) Encuadre automático a todo lo dibujado
      if (allLatLng.length) exploreMap.fitBounds(allLatLng, { padding: [30, 30] });
    } catch (err) {
      mapPointsLoaded = false;   // permite reintentar al reabrir
      console.error('No se pudo cargar el mapa:', err);
    }
  }

  // Dots de la CATEGORÍA actual (ventana alrededor del actual) + contador X/Y.
  function renderDots() {
    const cat = chronicles[idx].category;
    const start = catStart[cat];          // índice de la 1ª de la categoría
    const len = byCat[cat].length;        // efemérides en la categoría
    const pos = idx - start;              // posición dentro de la categoría
    const WINDOW = 15;
    let s = Math.max(0, pos - Math.floor(WINDOW / 2));
    let e = Math.min(len, s + WINDOW);
    s = Math.max(0, e - WINDOW);

    let dots = '';
    for (let i = s; i < e; i++) {
      const cur = i === pos;
      dots += `<button class="progress-dot${cur ? ' active' : ''}" onclick="goTo(${start + i})"${cur ? ' aria-current="true"' : ''} aria-label="Efeméride ${i + 1} de ${len} en ${escapeHtml(cat)}"></button>`;
    }
    document.getElementById('dots').innerHTML =
      `<div class="dots-track">${dots}</div><div class="dots-counter">${pos + 1} / ${len}</div>`;
  }

  function updateUrl() {
    const ev = chronicles[idx] && chronicles[idx].event_date;
    if (ev) history.replaceState(null, '', location.pathname + '?d=' + ev);
  }

  // Tras navegar por acción del usuario, devolvemos el foco a la tarjeta
  // para que el teclado no se pierda al destruirse el botón pulsado.
  function focusContent() {
    document.getElementById('content').focus({ preventScroll: true });
  }

  // Avanza/retrocede una efeméride. Al cruzar el borde de una categoría salta a
  // la siguiente/anterior (la lista plana ya está agrupada por categoría); en
  // los extremos del archivo da la vuelta.
  function next() { idx = (idx + 1) % chronicles.length; render(); focusContent(); }

  function prev() { idx = (idx - 1 + chronicles.length) % chronicles.length; render(); focusContent(); }

  function goTo(i) {
    if (i === idx) return;
    idx = i;
    render();
    focusContent();
  }

  // Salta a la 1ª efeméride de una categoría al azar (distinta a la actual).
  function randomStory() {
    if (categories.length < 2) return;
    const cur = chronicles[idx].category;
    let cat;
    do { cat = categories[Math.floor(Math.random() * categories.length)]; } while (cat === cur);
    idx = catStart[cat];
    render();
    focusContent();
  }

  // Salta a la 1ª efeméride de una categoría concreta.
  function goToCategory(cat) {
    if (catStart[cat] == null) return;
    idx = catStart[cat];
    render();
    focusContent();
  }

  // Abre la efeméride de una fecha concreta (usado por los pines del mapa).
  function openByDate(dateStr) {
    const i = chronicles.findIndex(c => c.event_date === dateStr);
    if (i >= 0) { idx = i; render(); focusContent(); }
  }

  // Compartir: usa el diálogo nativo si existe; si no, copia el enlace.
  async function share() {
    const c = chronicles[idx];
    const url = location.origin + location.pathname + '?d=' + c.event_date;
    try {
      if (navigator.share) {
        // Solo el enlace: si añadimos `text`, muchas apps comparten el
        // titular e ignoran la URL.
        await navigator.share({ url });
        return;
      }
      await navigator.clipboard.writeText(url);
      flashShare('¡Enlace copiado!');
    } catch (err) {
      if (err && err.name === 'AbortError') return; // el usuario canceló
      try { await navigator.clipboard.writeText(url); flashShare('¡Enlace copiado!'); }
      catch (_) { flashShare('No se pudo copiar'); }
    }
  }

  function flashShare(msg) {
    const btn = document.querySelector('.share-btn');
    if (!btn) return;
    const original = btn.textContent;
    btn.textContent = msg;
    btn.disabled = true;
    setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1500);
  }

  // Teclado: flechas (efeméride), Inicio/Fin (1ª/última de la categoría actual)
  document.addEventListener('keydown', (e) => {
    // Con el mapa abierto, solo escuchamos Escape para cerrarlo.
    if (!document.getElementById('mapModal').hidden) {
      if (e.key === 'Escape') closeMap();
      return;
    }
    if (!chronicles.length) return;
    if (e.key === 'ArrowLeft') prev();
    else if (e.key === 'ArrowRight') next();
    else if (e.key === 'Home') {
      e.preventDefault();
      idx = catStart[chronicles[idx].category];
      render(); focusContent();
    } else if (e.key === 'End') {
      e.preventDefault();
      const cat = chronicles[idx].category;
      idx = catStart[cat] + byCat[cat].length - 1;
      render(); focusContent();
    }
  });

  // Selector de categoría: saltar a su primera efeméride
  document.getElementById('catpick').addEventListener('change', (e) => {
    goToCategory(e.target.value);
  });

  // Navegación con gestos (swipe) en móvil
  let touchX = null;
  const cardEl = document.getElementById('card');
  cardEl.addEventListener('touchstart', (e) => {
    // Ignoramos gestos sobre el mini-mapa (pan/zoom) y los multitáctiles (pinch),
    // para no confundirlos con un swipe de navegación.
    if (e.touches.length > 1 || (e.target.closest && e.target.closest('.minimap'))) {
      touchX = null;
      return;
    }
    touchX = e.changedTouches[0].clientX;
  }, { passive: true });
  cardEl.addEventListener('touchend', (e) => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) { dx < 0 ? next() : prev(); }
    touchX = null;
  });

  // Reacciona a atrás/adelante del navegador (o a cambios manuales en la URL)
  window.addEventListener('popstate', () => {
    const ev = new URLSearchParams(location.search).get('d') || location.hash.slice(1);
    const i = ev ? chronicles.findIndex(c => c.event_date === ev) : -1;
    if (i >= 0 && i !== idx) { idx = i; render(); }
  });

  loadChronicles();

  // Leaflet carga con defer: cuando esté listo, pintamos el mini-mapa actual.
  window.addEventListener('load', () => {
    if (chronicles.length) updateMiniMap(chronicles[idx]);
  });

  // PWA: registramos el service worker para instalación y uso offline.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .catch(err => console.warn('Service worker no registrado:', err));
    });
  }
</script>
</body>
</html>
