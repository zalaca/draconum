<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment: #f2e8d5;
    --ink: #1c1208;
    --ink-faded: #4a3820;
    --ink-muted: #7a6045;
    --red-wax: #8b2020;
    --gold: #9a7230;
    --border-col: #b89a6a;
    --card-bg: #faf3e3;
  }

  body {
    background-color: #2a1f0e;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(100,70,30,0.08) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(100,70,30,0.05) 40px);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: 'EB Garamond', Georgia, serif;
  }

  .wrapper {
    max-width: 680px;
    width: 100%;
  }

  .masthead {
    text-align: center;
    margin-bottom: 2rem;
  }

  .masthead-rule {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.75rem;
  }

  .masthead-rule::before,
  .masthead-rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-col);
  }

  .compass {
    font-size: 1.6rem;
    color: var(--gold);
    line-height: 1;
  }

  .title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 600;
    color: var(--parchment);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .subtitle {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--border-col);
    font-size: 0.95rem;
    margin-top: 0.3rem;
  }

  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border-col);
    border-radius: 2px;
    padding: 2.5rem 2.5rem 2rem;
    position: relative;
    box-shadow: 0 0 0 4px rgba(184,154,106,0.15), 0 8px 32px rgba(0,0,0,0.5);
    min-height: 260px;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(184,154,106,0.3);
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.7;
  }
  .corner-tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  .date-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .date-pill {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--red-wax);
    border: 1px solid var(--red-wax);
    padding: 3px 10px;
    border-radius: 2px;
  }

  .category-tag {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.88rem;
    color: var(--ink-muted);
  }

  .fact-headline {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.1rem, 3vw, 1.45rem);
    font-weight: 600;
    color: var(--ink);
    line-height: 1.35;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border-col);
  }

  .fact-body {
    font-size: 1.08rem;
    line-height: 1.8;
    color: var(--ink-faded);
    margin-bottom: 1.5rem;
  }

  .fact-body em {
    color: var(--red-wax);
    font-style: italic;
  }

  .source-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 1rem;
    border-top: 1px solid var(--border-col);
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .source-label {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-muted);
  }

  .nav-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border-col);
    color: var(--ink-faded);
    font-family: 'EB Garamond', serif;
    font-size: 0.88rem;
    padding: 4px 14px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, color 0.15s;
  }

  .nav-btn:hover {
    background: var(--ink);
    color: var(--parchment);
    border-color: var(--ink);
  }

  .nav-btn:disabled {
    opacity: 0.35;
    cursor: default;
  }

  .nav-btn:disabled:hover {
    background: none;
    color: var(--ink-faded);
    border-color: var(--border-col);
  }

  .today-badge {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--red-wax);
    color: var(--parchment);
    padding: 3px 8px;
    border-radius: 2px;
  }

  .today-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--red-wax);
    color: var(--red-wax);
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, color 0.15s;
  }

  .today-btn:hover {
    background: var(--red-wax);
    color: var(--parchment);
  }

  .progress-bar {
    margin-top: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .dots-track {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .dots-counter {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--border-col);
    opacity: 0.75;
  }

  .progress-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border-col);
    opacity: 0.4;
    transition: opacity 0.2s;
    cursor: pointer;
    border: none;
    padding: 0;
  }

  .progress-dot.active {
    background: var(--red-wax);
    opacity: 1;
  }

  .footer {
    text-align: center;
    margin-top: 1.25rem;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.82rem;
    color: var(--border-col);
    opacity: 0.7;
  }

  .state-msg {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--ink-muted);
    text-align: center;
    padding: 3rem 0;
  }

  .busy-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(250, 243, 227, 0.85);
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--ink-muted);
    z-index: 2;
    border-radius: 2px;
  }

  .busy-overlay[hidden] { display: none; }

  .date-jump {
    margin-top: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .date-jump-label {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--border-col);
  }

  .date-jump-input {
    font-family: 'EB Garamond', serif;
    font-size: 0.9rem;
    color: var(--parchment);
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border-col);
    border-radius: 2px;
    padding: 7px 10px;
    min-height: 40px;        /* zona táctil cómoda en móvil */
    color-scheme: dark;      /* calendario nativo legible sobre fondo oscuro */
    cursor: pointer;
  }

  .date-jump-input:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  /* Descripción de la categoría/expedición bajo la fecha */
  .cat-desc {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.92rem;
    color: var(--ink-muted);
    margin-bottom: 1.1rem;
  }

  /* ---- Índice de categorías ---- */
  .index-modal {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    background: #2a1f0e;
  }

  .index-modal[hidden] { display: none; }

  .index-grid {
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 0.75rem;
    padding: 1rem;
    align-content: start;
  }

  .index-card {
    text-align: left;
    background: var(--card-bg);
    border: 1px solid var(--border-col);
    border-left: 4px solid var(--accent, var(--border-col));
    border-radius: 2px;
    padding: 0.9rem 1rem;
    cursor: pointer;
    font-family: 'EB Garamond', serif;
    color: var(--ink-faded);
    transition: transform 0.12s, box-shadow 0.12s;
  }

  .index-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4); }
  .index-card.active { outline: 2px solid var(--red-wax); }
  .index-card:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .index-card-name {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    color: var(--ink);
    margin-bottom: 0.25rem;
  }

  .index-card-meta {
    font-size: 0.78rem;
    color: var(--ink-muted);
    font-style: italic;
  }

  .index-card-desc {
    font-size: 0.82rem;
    color: var(--ink-faded);
    margin-top: 0.4rem;
  }

  /* ---- Buscador ---- */
  #searchInput {
    flex: 1;
    min-width: 0;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border-col);
    border-radius: 2px;
    color: var(--parchment);
    font-family: 'EB Garamond', serif;
    font-size: 1rem;
    text-transform: none;
    letter-spacing: normal;
    padding: 8px 12px;
    color-scheme: dark;
  }

  #searchInput:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .search-hint {
    grid-column: 1 / -1;
    text-align: center;
    padding: 2.5rem 1rem;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--border-col);
  }

  /* ---- Línea de tiempo ---- */
  .timeline {
    flex: 1;
    overflow-y: auto;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem 2.5rem;
  }

  .tl-node {
    position: relative;
    padding-left: 1.5rem;
    border-left: 2px solid var(--border-col);
    padding-bottom: 1.4rem;
  }

  .tl-node:last-child { border-left-color: transparent; }

  .tl-node::before {
    content: '';
    position: absolute;
    left: -8px;
    top: 2px;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--accent, var(--gold));
    border: 2px solid #2a1f0e;
  }

  .tl-range {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: var(--gold);
  }

  .tl-cat {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    color: var(--parchment);
  }

  .tl-entries {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    margin-top: 0.5rem;
  }

  .tl-entry {
    display: flex;
    gap: 0.6rem;
    align-items: baseline;
    text-align: left;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--border-col);
    font-family: 'EB Garamond', serif;
    font-size: 0.9rem;
    padding: 0.28rem 0.4rem;
    border-radius: 2px;
    transition: background 0.12s, color 0.12s;
  }

  .tl-entry:hover { background: rgba(255, 255, 255, 0.06); color: var(--parchment); }
  .tl-entry.active { color: var(--red-wax); font-weight: 500; }
  .tl-entry:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .tl-entry-date {
    flex: 0 0 auto;
    min-width: 6rem;
    font-style: italic;
    font-size: 0.78rem;
    color: var(--border-col);
    opacity: 0.8;
  }

  /* ---- Mapa ---- */
  .minimap {
    height: 200px;
    margin-top: 1.25rem;
    border: 1px solid var(--border-col);
    border-radius: 2px;
  }

  .minimap[hidden] { display: none; }

  /* Aspecto pergamino: filtro por tesela (no sobre el panel, que provoca
     parpadeos/desapariciones al hacer pan/zoom). No afecta a pines/controles. */
  .minimap .leaflet-tile,
  #exploreMap .leaflet-tile {
    filter: sepia(0.6) saturate(0.85) contrast(0.95) brightness(1.02);
  }

  .map-launch {
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .map-btn {
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .map-btn:hover { background: var(--gold); color: var(--card-bg); }

  .map-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .map-modal {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    background: #2a1f0e;
  }

  .map-modal[hidden] { display: none; }

  .map-modal-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border-col);
    color: var(--parchment);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .explore-map { flex: 1; }

  .map-popup-btn {
    margin-top: 6px;
    background: var(--red-wax);
    color: var(--parchment);
    border: none;
    border-radius: 2px;
    padding: 4px 12px;
    font-family: 'EB Garamond', serif;
    font-size: 0.85rem;
    cursor: pointer;
  }

  /* Pin estilo sello de lacre. El <span> interno es el círculo visible;
     los pines de ruta colorean el fondo en línea con el color de su ruta. */
  .map-pin span {
    display: block;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--red-wax);
    border: 2px solid var(--card-bg);
    box-shadow: 0 0 0 1px var(--gold), 0 2px 5px rgba(0, 0, 0, 0.55);
    box-sizing: border-box;
    transition: transform 0.12s;
  }

  .map-pin:hover span { transform: scale(1.25); }

  /* Efeméride suelta (fuera de toda ruta): aro hueco, sin relleno */
  .map-pin.hollow span {
    background: transparent;
    border: 2px solid var(--gold);
    box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5), 0 2px 5px rgba(0, 0, 0, 0.45);
  }

  /* Popups en pergamino */
  .leaflet-popup-content-wrapper,
  .leaflet-popup-tip {
    background: var(--card-bg);
    color: var(--ink);
    border: 1px solid var(--border-col);
    border-radius: 2px;
  }

  .leaflet-popup-content {
    font-family: 'EB Garamond', serif;
    color: var(--ink-faded);
  }

  .leaflet-popup-content strong { font-family: 'Cinzel', serif; color: var(--ink); }

  .leaflet-container a.leaflet-popup-close-button { color: var(--ink-muted); }

  /* Popup con varias efemérides en el mismo punto */
  .map-popup-head { display: block; margin-bottom: 6px; }
  .map-popup-item { padding: 6px 0; }
  .map-popup-item + .map-popup-item { border-top: 1px solid var(--border-col); }
  .map-popup-item span { display: block; margin-bottom: 4px; }

  /* Halo pulsante de la efeméride que estabas leyendo */
  .map-current { background: none; border: 0; }
  .map-current span {
    display: block; width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--red-wax);
    box-shadow: 0 0 0 0 rgba(139, 32, 32, 0.5);
    animation: map-pulse 1.8s ease-out infinite;
    pointer-events: none;
  }
  @keyframes map-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(139, 32, 32, 0.5); }
    70%  { box-shadow: 0 0 0 15px rgba(139, 32, 32, 0); }
    100% { box-shadow: 0 0 0 0 rgba(139, 32, 32, 0); }
  }

  /* Leyenda de expediciones (esquina del mapa) */
  .map-legend {
    background: var(--card-bg); border: 1px solid var(--border-col); border-radius: 2px;
    padding: 8px 10px; max-width: 220px; max-height: 45vh; overflow-y: auto;
    font-family: 'EB Garamond', serif; color: var(--ink);
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
  }
  .map-legend-title { font-family: 'Cinzel', serif; font-size: 0.82rem; margin-bottom: 6px; }
  .map-legend-item {
    display: flex; align-items: center; gap: 7px; width: 100%;
    background: none; border: 0; padding: 4px 5px; border-radius: 2px;
    font: inherit; color: inherit; text-align: left; cursor: pointer;
  }
  .map-legend-item:hover { background: rgba(0, 0, 0, 0.06); }
  .map-legend-item.active { background: rgba(139, 32, 32, 0.14); }
  .map-legend-swatch {
    width: 12px; height: 12px; border-radius: 50%; flex: 0 0 auto;
    border: 1px solid rgba(0, 0, 0, 0.3);
  }
  .map-legend-note { margin-top: 6px; font-size: 0.72rem; color: var(--ink-muted); }

  /* Botón "Vista general" */
  .map-overview-btn {
    background: var(--card-bg); border: 1px solid var(--border-col); border-radius: 2px;
    padding: 6px 10px; font-family: 'Cinzel', serif; font-size: 0.78rem; color: var(--ink);
    cursor: pointer; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
  }
  .map-overview-btn:hover { background: var(--parchment); }

  /* Foco visible y de marca para navegación con teclado */
  .nav-btn:focus-visible,
  .today-btn:focus-visible,
  .progress-dot:focus-visible {
    outline: 2px solid var(--red-wax);
    outline-offset: 2px;
  }

  .progress-dot[aria-current="true"] {
    outline: 1px solid var(--red-wax);
    outline-offset: 2px;
  }

  /* Respeta a quien prefiere menos movimiento */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition: none !important;
      animation: none !important;
    }
    html { scroll-behavior: auto; }
  }

  /* Ajustes para pantallas pequeñas: evita que los botones se desborden */
  @media (max-width: 540px) {
    body { padding: 1rem 0.6rem; }

    .card { padding: 1.75rem 1.25rem 1.5rem; }

    .source-row { flex-direction: column; align-items: stretch; }

    .nav-row {
      width: 100%;
      justify-content: stretch;
    }

    .nav-row .nav-btn {
      flex: 1 1 auto;
      text-align: center;
      padding: 8px 10px;
      font-size: 0.82rem;
    }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="masthead">
    <div class="masthead-rule">
      <span class="compass">✦</span>
    </div>
    <div class="title">Hic Sunt Dracones</div>
    <div class="subtitle">Donde los mapas terminan, comienza la historia</div>
  </div>

  <div class="card" id="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div id="content" aria-live="polite" aria-atomic="true" tabindex="-1">
      <div class="state-msg">Desplegando velas...</div>
    </div>
    <div id="minimap" class="minimap" aria-label="Mapa del lugar del suceso" hidden></div>
  </div>

  <div class="map-launch">
    <button class="map-btn" onclick="openSearch()">✦ Buscar</button>
    <button class="map-btn" onclick="openTimeline()">✦ Línea de tiempo</button>
    <button class="map-btn" onclick="openIndex()">✦ Índice</button>
    <button class="map-btn" onclick="openMap()">✦ Mapa</button>
  </div>

  <nav class="progress-bar" id="dots" aria-label="Navegación de crónicas"></nav>

  <div class="date-jump">
    <label for="catpick" class="date-jump-label">Saltar a una categoría</label>
    <select id="catpick" class="date-jump-input" aria-label="Saltar a una categoría"></select>
  </div>

  <div class="footer">
    Navega la historia · agrupada por categorías
  </div>
</div>

<div class="map-modal" id="mapModal" role="dialog" aria-label="Mapa de efemérides" hidden>
  <div class="map-modal-bar">
    <span>✦ Explorar el archivo</span>
    <button class="nav-btn" onclick="closeMap()" aria-label="Cerrar mapa">Cerrar ✕</button>
  </div>
  <div id="exploreMap" class="explore-map"></div>
</div>

<div class="index-modal" id="indexModal" role="dialog" aria-label="Índice de categorías" hidden>
  <div class="map-modal-bar">
    <span>✦ Índice de categorías</span>
    <button class="nav-btn" onclick="closeIndex()" aria-label="Cerrar índice">Cerrar ✕</button>
  </div>
  <div id="indexGrid" class="index-grid"></div>
</div>

<div class="index-modal" id="searchModal" role="dialog" aria-label="Buscar en el archivo" hidden>
  <div class="map-modal-bar">
    <input id="searchInput" type="search" placeholder="Buscar por título, texto o categoría…" aria-label="Buscar en el archivo">
    <button class="nav-btn" onclick="closeSearch()" aria-label="Cerrar búsqueda">Cerrar ✕</button>
  </div>
  <div id="searchResults" class="index-grid"></div>
</div>

<div class="index-modal" id="timelineModal" role="dialog" aria-label="Línea de tiempo" hidden>
  <div class="map-modal-bar">
    <span>✦ Línea de tiempo</span>
    <button class="nav-btn" onclick="closeTimeline()" aria-label="Cerrar línea de tiempo">Cerrar ✕</button>
  </div>
  <div id="timeline" class="timeline"></div>
</div>

<script>
  // ---- CONFIGURACIÓN DE SUPABASE ----
  const SUPABASE_URL = "https://cbmzxibsbftrdrbedloj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_fvf0-ABfk_SMiSwFbzU7Iw_zVA1_aLM";
  // ------------------------------------

  const COLS = "id,event_date,date_label,title,body,source,category,lat,lng,place_name";
  const FETCH_TIMEOUT = 10000;                           // ms antes de abortar

  let chronicles = [];   // todas las efemérides, agrupadas por categoría (lista plana)
  let idx = 0;
  let categories = [];   // nombres de categoría, en orden de 1ª aparición (event_date)
  let byCat = {};        // categoría -> array de sus efemérides (event_date asc)
  let catStart = {};     // categoría -> índice de su primera efeméride en chronicles
  let catInfo = {};      // categoría (= routes.name) -> { id, color, description }
  let pointsByRoute = {}; // route_id -> puntos de ruta (ordenados por seq)

  // fetch a Supabase con timeout (evita que la página se quede colgada)
  async function apiFetch(query, withCount, table = 'chronicles') {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), FETCH_TIMEOUT);
    try {
      const headers = {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
      };
      if (withCount) headers["Prefer"] = "count=exact";
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
        headers, signal: ctrl.signal
      });
      if (!res.ok) throw new Error("Error de red: " + res.status);
      return res;
    } finally {
      clearTimeout(timer);
    }
  }

  async function loadChronicles() {
    document.getElementById('content').innerHTML =
      '<div class="state-msg">Desplegando velas...</div>';
    try {
      // Todo el archivo activo (ordenado por event_date, la clave de orden
      // interna) + las rutas (para descripción y color de cada categoría).
      const [res, routes, rpts] = await Promise.all([
        apiFetch(`select=${COLS}&active=eq.true&order=event_date.asc`, false),
        apiFetch('select=id,name,color,description', false, 'routes')
          .then(r => r.json()).catch(() => []),
        apiFetch('select=route_id,seq,lat,lng,chronicle_id&order=route_id.asc,seq.asc', false, 'route_points')
          .then(r => r.json()).catch(() => [])
      ]);
      const asc = await res.json();
      if (!asc.length) {
        document.getElementById('content').innerHTML =
          '<div class="state-msg">No hay crónicas disponibles todavía.</div>';
        return;
      }

      catInfo = {};
      routes.forEach(r => { catInfo[r.name] = { id: r.id, color: r.color, description: r.description }; });
      pointsByRoute = {};
      rpts.forEach(p => { (pointsByRoute[p.route_id] = pointsByRoute[p.route_id] || []).push(p); });

      // Orden de categorías = 1ª aparición (es decir, su event_date más antiguo).
      categories = [];
      byCat = {};
      catStart = {};
      const seen = new Set();
      asc.forEach(c => {
        if (!seen.has(c.category)) { seen.add(c.category); categories.push(c.category); }
        (byCat[c.category] = byCat[c.category] || []).push(c);
      });
      // Lista plana: categorías en orden, cada una con sus efemérides en orden.
      chronicles = [];
      categories.forEach(cat => { catStart[cat] = chronicles.length; chronicles.push(...byCat[cat]); });

      setupCategoryPicker();

      // Posición inicial: deep-link ?id= (o el antiguo ?d=fecha); si no, azar.
      const linkIdx = deepLinkIdx();
      idx = linkIdx >= 0
        ? linkIdx
        : catStart[categories[Math.floor(Math.random() * categories.length)]];
      render();
    } catch (err) {
      const msg = err && err.name === 'AbortError'
        ? 'La conexión tardó demasiado.'
        : 'No se pudo contactar con el archivo. Revisa la conexión.';
      document.getElementById('content').innerHTML =
        `<div class="state-msg">${msg}` +
        '<br><button class="nav-btn" style="margin-top:1rem" onclick="loadChronicles()">Reintentar</button></div>';
      console.error(err);
    }
  }

  // Rellena el desplegable de categorías (orden alfabético para buscar rápido).
  function setupCategoryPicker() {
    const sel = document.getElementById('catpick');
    if (!sel) return;
    const sorted = [...categories].sort((a, b) => a.localeCompare(b, 'es'));
    sel.innerHTML = sorted.map(cat =>
      `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`
    ).join('');
  }

  function formatDate(iso) {
    // Parseamos la fecha de la crónica (YYYY-MM-DD) sin desfase de zona horaria
    const d = iso ? new Date(iso + 'T00:00:00') : new Date();
    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
  }

  // Evita XSS: escapa cualquier HTML que venga de los datos.
  function escapeHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // El cuerpo permite solo cursivas: escapamos todo y restauramos <em>.
  function renderBody(s) {
    return escapeHtml(s)
      .replace(/&lt;em&gt;/g, '<em>')
      .replace(/&lt;\/em&gt;/g, '</em>');
  }

  function render() {
    const c = chronicles[idx];
    const desc = catInfo[c.category] && catInfo[c.category].description;

    document.getElementById('content').innerHTML = `
      <div class="date-row">
        <span class="date-pill">${escapeHtml(c.date_label || formatDate(c.event_date))}</span>
        <span class="category-tag">${escapeHtml(c.category)}</span>
      </div>
      ${desc ? `<div class="cat-desc">${escapeHtml(desc)}</div>` : ''}
      <div class="fact-headline">${escapeHtml(c.title)}</div>
      <div class="fact-body">${renderBody(c.body)}</div>
      <div class="source-row">
        <span class="source-label">${escapeHtml(c.source)}</span>
        <div class="nav-row">
          <button class="nav-btn share-btn" onclick="share()" aria-label="Compartir esta efeméride">Compartir</button>
          <button class="nav-btn" onclick="randomStory()" aria-label="Ir a una historia al azar">Historia aleatoria</button>
          <button class="nav-btn" onclick="prev()" aria-label="Efeméride anterior">&larr; Anterior</button>
          <button class="nav-btn" onclick="next()" aria-label="Efeméride siguiente">Siguiente &rarr;</button>
        </div>
      </div>
    `;

    renderDots();
    updateUrl();

    // El desplegable refleja la categoría visible
    const sel = document.getElementById('catpick');
    if (sel) sel.value = c.category;

    // Mini-mapa del lugar del suceso (si la crónica tiene coordenadas)
    updateMiniMap(c);
  }

  // ---- Mapa ----
  let miniMap, miniMarker, miniRoute;

  // Recalcula el tamaño del mapa de forma fiable tras mostrar/redimensionar
  // su contenedor (dos frames para que el layout ya esté aplicado).
  function refreshMap(map) {
    requestAnimationFrame(() => requestAnimationFrame(() => map.invalidateSize(false)));
  }

  // Iconos de pin (memoizados por color; se crean con Leaflet ya cargado).
  const ICON_OPTS = { iconSize: [16, 16], iconAnchor: [8, 8], popupAnchor: [0, -10] };
  const sealIcons = {};

  // Sello relleno; si se pasa color, lo usa (color de la ruta).
  function sealIcon(color) {
    const key = color || 'default';
    if (!sealIcons[key]) {
      sealIcons[key] = L.divIcon({
        className: 'map-pin',
        html: color ? `<span style="background:${color}"></span>` : '<span></span>',
        ...ICON_OPTS
      });
    }
    return sealIcons[key];
  }

  // Aro hueco para efemérides sueltas (fuera de cualquier ruta).
  let hollowIcon;
  function standalonePin() {
    if (!hollowIcon) {
      hollowIcon = L.divIcon({ className: 'map-pin hollow', html: '<span></span>', ...ICON_OPTS });
    }
    return hollowIcon;
  }

  // Popup con el titular y un botón para abrir esa efeméride.
  function pointPopup(title, date) {
    return `<strong>${escapeHtml(title)}</strong><br>` +
           `<button class="map-popup-btn" data-date="${escapeHtml(date)}">Leer</button>`;
  }

  // Popup para un punto donde coinciden varias efemérides: las lista todas, cada
  // una con su botón, para que ninguna quede tapada e inaccesible.
  function multiPointPopup(entries) {
    return `<strong class="map-popup-head">${entries.length} efemérides aquí</strong>` +
      entries.map(en =>
        `<div class="map-popup-item"><span>${escapeHtml(en.title)}</span>` +
        `<button class="map-popup-btn" data-date="${escapeHtml(en.date)}">Leer</button></div>`
      ).join('');
  }

  // Muestra el mini-mapa con el lugar de la crónica y, si pertenece a una ruta,
  // el tramo de la travesía recorrido "hasta aquí" (puntos con seq ≤ actual).
  function updateMiniMap(c) {
    const box = document.getElementById('minimap');
    if (!box || !window.L) { if (box) box.hidden = true; return; }

    const route = catInfo[c.category];
    const pts = route && route.id != null ? pointsByRoute[route.id] : null;
    let soFar = null, here = null;
    if (pts) {
      const cp = pts.find(p => p.chronicle_id === c.id);
      if (cp) {
        here = [cp.lat, cp.lng];
        soFar = pts.filter(p => p.seq <= cp.seq && p.lat != null && p.lng != null)
                   .map(p => [p.lat, p.lng]);
      }
    }
    if (!here && c.lat != null && c.lng != null) here = [c.lat, c.lng];

    if (!here) { box.hidden = true; return; }   // sin ubicación ni tramo
    box.hidden = false;

    if (!miniMap) {
      miniMap = L.map(box, {
        scrollWheelZoom: false,
        attributionControl: true,
        fadeAnimation: false   // evita parpadeo/desaparición de teselas
      });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18, attribution: '&copy; OpenStreetMap'
      }).addTo(miniMap);
    }

    // Redibuja el tramo recorrido
    if (miniRoute) { miniMap.removeLayer(miniRoute); miniRoute = null; }
    if (soFar && soFar.length > 1) {
      const color = (route && route.color) || '#8b2020';
      miniRoute = L.polyline(soFar, { color, weight: 2.5, opacity: 0.85, dashArray: '6 6' }).addTo(miniMap);
    }

    // Marcador "aquí"
    if (miniMarker) miniMarker.setLatLng(here);
    else miniMarker = L.marker(here, { icon: sealIcon() }).addTo(miniMap);
    if (c.place_name) miniMarker.bindPopup(escapeHtml(c.place_name));

    // Encuadra al tramo recorrido, o centra en el punto si es único
    if (soFar && soFar.length > 1) miniMap.fitBounds(soFar, { padding: [20, 20] });
    else miniMap.setView(here, 5);

    refreshMap(miniMap);
  }

  let exploreMap, mapPointsLoaded = false;
  let routeLines = {};      // route_id -> { paths, color } (se pinta bajo demanda)
  let shownRouteLine = null; // la polyline actualmente visible (una a la vez)
  let shownRouteRid = null;  // route_id de la ruta visible (para sincronizar leyenda)
  let currentHighlight = null; // halo de la efeméride que estabas leyendo
  let mapAllBounds = null;   // encuadre de todo el contenido (botón "Vista general")
  let routeMeta = {};        // route_id -> { name, color } para la leyenda

  // Normaliza una longitud (posiblemente extendida, p. ej. -383) al rango ±180.
  function normLng(lng) { return lng - Math.round(lng / 360) * 360; }

  // Copias del mundo a cada lado. worldCopyJump solo reengancha el centro de la
  // vista, no rellena la copia contigua: si no replicamos las marcas/rutas, al
  // arrastrar media pantalla queda vacía. Con el centro acotado a la copia
  // central por worldCopyJump, basta con ±1 copia.
  const WORLD_COPIES = [-360, 0, 360];

  // Añade un marcador replicado en las copias contiguas del mundo.
  function addWorldMarker(lat, lng, icon, routeId, popupHtml) {
    WORLD_COPIES.forEach(off => {
      L.marker([lat, lng + off], { icon, routeId }).addTo(exploreMap).bindPopup(popupHtml);
    });
  }

  // Parte una polilínea en tramos que no crucen el antimeridiano, para que se
  // dibuje bien en el mapa envolvente. Donde dos puntos consecutivos saltan más
  // de 180° (cruce del ±180), corta el tramo interpolando la latitud en el borde
  // y lo continúa por el borde opuesto. Devuelve un array de tramos (multilínea).
  function splitAtAntimeridian(pts) {
    const paths = [];
    let cur = [], prev = null;
    for (const [lat, rawLng] of pts) {
      const nlng = normLng(rawLng);
      if (!prev) { cur = [[lat, nlng]]; prev = [lat, nlng]; continue; }
      const [plat, plng] = prev;
      const d = nlng - plng;
      if (Math.abs(d) > 180) {                     // cruza el antimeridiano
        const unwrapped = d > 0 ? nlng - 360 : nlng + 360;
        const boundary = unwrapped < 0 ? -180 : 180;
        const t = (boundary - plng) / (unwrapped - plng);
        const latCross = plat + t * (lat - plat);
        cur.push([latCross, boundary]);
        paths.push(cur);
        cur = [[latCross, -boundary], [lat, nlng]];
      } else {
        cur.push([lat, nlng]);
      }
      prev = [lat, nlng];
    }
    if (cur.length) paths.push(cur);
    return paths;
  }

  async function openMap() {
    if (!window.L) return;   // Leaflet no cargó (¿offline?)
    const modal = document.getElementById('mapModal');
    modal.hidden = false;
    document.body.style.overflow = 'hidden';
    if (!exploreMap) {
      // Mapa envolvente (worldCopyJump): al arrastrar a otra "copia" del mundo,
      // Leaflet salta a la original para que marcas y rutas sigan visibles.
      // Para que funcione, TODO se normaliza a ±180 (los datos traen longitudes
      // extendidas, p. ej. -383, para las travesías del Pacífico) y las rutas se
      // parten en el antimeridiano (ver normLng / splitAtAntimeridian).
      // minZoom: 2 evita alejarse hasta ver copias vacías del mundo (solo
      // replicamos ±1 copia); mantiene la ilusión circular.
      exploreMap = L.map('exploreMap', { fadeAnimation: false, worldCopyJump: true, minZoom: 2 })
        .setView([20, 0], 2);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18, attribution: '&copy; OpenStreetMap'
      }).addTo(exploreMap);
      // Al pulsar "Leer" abrimos esa efeméride. El popup puede listar varias
      // (cuando coinciden en el mismo punto), así que cableamos todos los botones.
      exploreMap.on('popupopen', (e) => {
        e.popup.getElement().querySelectorAll('.map-popup-btn').forEach(btn => {
          btn.onclick = () => { closeMap(); openByDate(btn.dataset.date); };
        });
        // Muestra la ruta del pin pulsado (si pertenece a una).
        const src = e.popup._source;
        showRoute(src && src.options.routeId);
      });
      // Al cerrar el popup, se oculta la ruta.
      exploreMap.on('popupclose', () => showRoute(null));
    }
    refreshMap(exploreMap);
    if (!mapPointsLoaded) await loadMapPoints();
    focusCurrentOnMap();
  }

  // Al abrir: encuadra todo el archivo y resalta la efeméride que estabas
  // leyendo, para no perder el contexto. (Dos frames para que el layout ya esté.)
  function focusCurrentOnMap() {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      exploreMap.invalidateSize(false);
      highlightCurrent();
      if (mapAllBounds) exploreMap.fitBounds(mapAllBounds, { padding: [30, 30] });
    }));
  }

  // Halo pulsante sobre la efeméride actual (si tiene coordenadas). No es
  // interactivo y va detrás de los pines para no taparlos ni bloquear clics.
  function highlightCurrent() {
    if (currentHighlight) { exploreMap.removeLayer(currentHighlight); currentHighlight = null; }
    const c = chronicles[idx];
    if (!c || c.lat == null || c.lng == null) return;
    currentHighlight = L.marker([c.lat, normLng(c.lng)], {
      icon: L.divIcon({ className: 'map-current', html: '<span></span>', iconSize: [24, 24], iconAnchor: [12, 12] }),
      interactive: false, zIndexOffset: -1000, keyboard: false,
    }).addTo(exploreMap);
  }

  function closeMap() {
    document.getElementById('mapModal').hidden = true;
    document.body.style.overflow = '';
    if (exploreMap) exploreMap.closePopup();   // dispara popupclose → oculta la ruta
  }

  // Dibuja la ruta indicada (solo una a la vez); con rid nulo, la oculta.
  function showRoute(rid) {
    if (shownRouteLine) { exploreMap.removeLayer(shownRouteLine); shownRouteLine = null; }
    shownRouteRid = null;
    const line = rid != null && routeLines[rid];
    if (line) {
      // Replicamos cada tramo en las copias contiguas (igual que las marcas).
      const multi = [];
      line.paths.forEach(seg => WORLD_COPIES.forEach(off =>
        multi.push(seg.map(([la, ln]) => [la, ln + off]))));
      shownRouteLine = L.polyline(multi, {
        color: line.color, weight: 2.5, opacity: 0.85, dashArray: '6 6'
      }).addTo(exploreMap);
      shownRouteRid = rid;
    }
    syncLegend();
  }

  // Marca en la leyenda qué ruta está resaltada.
  function syncLegend() {
    document.querySelectorAll('.map-legend-item').forEach(b =>
      b.classList.toggle('active', b.dataset.rid === String(shownRouteRid)));
  }

  // Leyenda de expediciones (arriba-dcha) + botón "Vista general" (abajo-izda).
  // Se crean una vez, tras cargar los puntos. Pulsar una expedición la resalta y
  // encuadra; volver a pulsarla la oculta.
  function buildMapControls() {
    const rids = Object.keys(routeLines);
    if (rids.length) {
      const legend = L.control({ position: 'topright' });
      legend.onAdd = () => {
        const div = L.DomUtil.create('div', 'map-legend');
        div.innerHTML = '<div class="map-legend-title">Expediciones</div>' +
          rids.map(rid => {
            const m = routeMeta[rid] || {};
            return `<button class="map-legend-item" data-rid="${escapeHtml(rid)}">` +
              `<span class="map-legend-swatch" style="background:${escapeHtml(m.color || '#8b2020')}"></span>` +
              `<span class="map-legend-name">${escapeHtml(m.name || 'Ruta ' + rid)}</span></button>`;
          }).join('') +
          '<div class="map-legend-note">Pulsa para trazar la ruta</div>';
        L.DomEvent.disableClickPropagation(div);
        div.querySelectorAll('.map-legend-item').forEach(btn => {
          btn.addEventListener('click', () => {
            const rid = btn.dataset.rid;
            const wasActive = String(shownRouteRid) === rid;
            exploreMap.closePopup();
            showRoute(wasActive ? null : rid);
            if (!wasActive && routeLines[rid]) {
              const pts = routeLines[rid].paths.flat();
              if (pts.length) exploreMap.fitBounds(pts, { padding: [40, 40] });
            }
          });
        });
        return div;
      };
      legend.addTo(exploreMap);
    }

    const overview = L.control({ position: 'bottomleft' });
    overview.onAdd = () => {
      const b = L.DomUtil.create('button', 'map-overview-btn');
      b.type = 'button';
      b.innerHTML = '✦ Vista general';
      L.DomEvent.disableClickPropagation(b);
      b.addEventListener('click', () => {
        exploreMap.closePopup();
        if (mapAllBounds) exploreMap.fitBounds(mapAllBounds, { padding: [30, 30] });
      });
      return b;
    };
    overview.addTo(exploreMap);
  }

  // ---- Índice de categorías ----
  function openIndex() {
    buildIndex();
    document.getElementById('indexModal').hidden = false;
    document.body.style.overflow = 'hidden';
  }

  function closeIndex() {
    document.getElementById('indexModal').hidden = true;
    document.body.style.overflow = '';
  }

  // ---- Línea de tiempo ----
  function openTimeline() {
    buildTimeline();
    document.getElementById('timelineModal').hidden = false;
    document.body.style.overflow = 'hidden';
    // Centra la vista en la efeméride activa
    const active = document.querySelector('#timeline .tl-entry.active');
    if (active) active.scrollIntoView({ block: 'center' });
  }

  function closeTimeline() {
    document.getElementById('timelineModal').hidden = true;
    document.body.style.overflow = '';
  }

  // Timeline vertical: un hito por categoría (orden cronológico) con sus
  // efemérides debajo, todas clicables.
  function buildTimeline() {
    document.getElementById('timeline').innerHTML = categories.map(cat => {
      const items = byCat[cat];
      const n = items.length;
      const first = items[0].date_label || '';
      const last = items[n - 1].date_label || '';
      const range = n > 1 && last && last !== first ? `${first} – ${last}` : first;
      const accent = (catInfo[cat] && catInfo[cat].color) || 'var(--gold)';
      const start = catStart[cat];
      const entries = items.map((c, j) => {
        const gi = start + j;
        return `<button class="tl-entry${gi === idx ? ' active' : ''}" data-idx="${gi}">
          <span class="tl-entry-date">${escapeHtml(c.date_label || '')}</span>
          <span class="tl-entry-title">${escapeHtml(c.title)}</span>
        </button>`;
      }).join('');
      return `<div class="tl-node" style="--accent:${escapeHtml(accent)}">
        <div class="tl-head">
          <span class="tl-range">${escapeHtml(range)}</span>
          <span class="tl-cat">${escapeHtml(cat)}</span>
        </div>
        <div class="tl-entries">${entries}</div>
      </div>`;
    }).join('');
  }

  // ---- Buscador ----
  // Normaliza para comparar sin distinguir mayúsculas ni acentos.
  function normalize(s) {
    return String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();
  }

  function openSearch() {
    document.getElementById('searchModal').hidden = false;
    document.body.style.overflow = 'hidden';
    const input = document.getElementById('searchInput');
    runSearch(input.value);
    input.focus();
  }

  function closeSearch() {
    document.getElementById('searchModal').hidden = true;
    document.body.style.overflow = '';
  }

  // Busca en título, cuerpo y categoría (todo en memoria) y pinta resultados.
  function runSearch(q) {
    const query = normalize(q).trim();
    const box = document.getElementById('searchResults');
    if (!query) {
      box.innerHTML = '<div class="search-hint">Escribe para buscar por título, texto o categoría…</div>';
      return;
    }
    const hits = [];
    for (let i = 0; i < chronicles.length && hits.length < 80; i++) {
      const c = chronicles[i];
      if (normalize(c.title + ' ' + c.body + ' ' + c.category).includes(query)) hits.push(i);
    }
    if (!hits.length) {
      box.innerHTML = '<div class="search-hint">Sin resultados para “' + escapeHtml(q) + '”.</div>';
      return;
    }
    box.innerHTML = hits.map(i => {
      const c = chronicles[i];
      const accent = (catInfo[c.category] && catInfo[c.category].color) || 'var(--border-col)';
      return `<button class="index-card" style="--accent:${escapeHtml(accent)}" data-idx="${i}">
        <div class="index-card-name">${escapeHtml(c.title)}</div>
        <div class="index-card-meta">${escapeHtml(c.category)}${c.date_label ? ' · ' + escapeHtml(c.date_label) : ''}</div>
      </button>`;
    }).join('');
  }

  // Grid de categorías (orden cronológico), con conteo, rango y descripción.
  function buildIndex() {
    const curCat = chronicles[idx].category;
    document.getElementById('indexGrid').innerHTML = categories.map(cat => {
      const items = byCat[cat];
      const n = items.length;
      const first = items[0].date_label || '';
      const last = items[n - 1].date_label || '';
      const range = n > 1 && last && last !== first ? `${first} – ${last}` : first;
      const info = catInfo[cat] || {};
      const accent = info.color || 'var(--border-col)';
      const desc = info.description
        ? `<div class="index-card-desc">${escapeHtml(info.description)}</div>` : '';
      return `<button class="index-card${cat === curCat ? ' active' : ''}" style="--accent:${escapeHtml(accent)}" data-cat="${escapeHtml(cat)}">
        <div class="index-card-name">${escapeHtml(cat)}</div>
        <div class="index-card-meta">${n} efeméride${n === 1 ? '' : 's'}${range ? ' · ' + escapeHtml(range) : ''}</div>
        ${desc}
      </button>`;
    }).join('');
  }

  // Pinta los pines (de ruta y sueltos). Las líneas se guardan y solo se
  // dibujan al pulsar un pin de esa ruta (ver showRoute).
  async function loadMapPoints() {
    mapPointsLoaded = true;
    try {
      const allLatLng = [];          // para encuadrar el mapa al final
      const onLine = new Set();      // fechas ya representadas en una ruta
      routeLines = {};
      routeMeta = {};

      // Agrupamos las efemérides por coordenada exacta: si varias caen en el
      // mismo punto (p. ej. Canarias), luego se dibuja UN marcador cuyo popup las
      // lista todas, para que ninguna quede tapada e inaccesible.
      const bySpot = new Map();
      const addSpot = (lat, lng, title, date, routeId, icon) => {
        const key = lat.toFixed(4) + ',' + lng.toFixed(4);
        let spot = bySpot.get(key);
        if (!spot) { spot = { lat, lng, icon, routeId, entries: [] }; bySpot.set(key, spot); allLatLng.push([lat, lng]); }
        spot.entries.push({ title, date });
      };

      // 1) Rutas (color y nombre) y sus puntos (ordenados por seq). La efeméride
      //    enlazada viene embebida; la RLS oculta las aún no publicadas (futuras).
      const [routes, rpts] = await Promise.all([
        apiFetch('select=id,name,color', false, 'routes').then(r => r.json()),
        apiFetch('select=route_id,seq,lat,lng,chronicle:chronicles(event_date,title)&order=route_id.asc,seq.asc', false, 'route_points').then(r => r.json())
      ]);
      const routeById = {};
      routes.forEach(r => { routeById[r.id] = r; });

      const byRoute = {};
      rpts.forEach(p => { (byRoute[p.route_id] = byRoute[p.route_id] || []).push(p); });

      Object.keys(byRoute).forEach(rid => {
        const pts = byRoute[rid].filter(p => p.lat != null && p.lng != null);
        // Solo dibujamos rutas que ya han empezado (con alguna efeméride publicada).
        if (!pts.some(p => p.chronicle)) return;
        const color = (routeById[rid] && routeById[rid].color) || '#8b2020';

        // Guardamos la travesía ya partida en el antimeridiano y normalizada a
        // ±180 (se pinta al pulsar un pin suyo).
        const paths = splitAtAntimeridian(pts.map(p => [p.lat, p.lng]));
        routeLines[rid] = { paths, color };
        routeMeta[rid] = { name: routeById[rid] && routeById[rid].name, color };
        paths.forEach(seg => allLatLng.push(...seg));

        // Pines solo en los puntos con efeméride publicada (etiquetados con su
        // ruta); normalizamos la longitud para que caigan en la copia principal.
        pts.forEach(p => {
          if (!p.chronicle) return;
          onLine.add(p.chronicle.event_date);
          addSpot(p.lat, normLng(p.lng), p.chronicle.title, p.chronicle.event_date, rid, sealIcon(color));
        });
      });

      // 2) Efemérides con coordenadas que NO están en ninguna línea → aro hueco.
      //    Si pertenecen a una expedición (su categoría = una ruta), las
      //    etiquetamos con esa ruta para que al pulsarlas se pinte igualmente
      //    (p. ej. naufragios fuera del trazado, como la San Lesmes).
      //    Reutilizamos `chronicles` (ya en memoria desde la carga inicial) en
      //    lugar de volver a descargar todo el archivo: mismo conjunto (activas
      //    con coordenadas) sin un round-trip extra al abrir el mapa.
      chronicles.forEach(p => {
        if (p.lat == null || p.lng == null || onLine.has(p.event_date)) return;
        const rid = catInfo[p.category] && catInfo[p.category].id;
        addSpot(p.lat, normLng(p.lng), p.title, p.event_date, rid, standalonePin());
      });

      // 3) Un marcador por coordenada: popup simple si hay una sola efeméride, o
      //    combinado (lista) si coinciden varias en el mismo punto.
      bySpot.forEach(spot => {
        const html = spot.entries.length === 1
          ? pointPopup(spot.entries[0].title, spot.entries[0].date)
          : multiPointPopup(spot.entries);
        addWorldMarker(spot.lat, spot.lng, spot.icon, spot.routeId, html);
      });

      // 4) Guardamos el encuadre global (botón "Vista general") y creamos los
      //    controles. El encuadre inicial lo hace focusCurrentOnMap al abrir.
      mapAllBounds = allLatLng.length ? L.latLngBounds(allLatLng) : null;
      buildMapControls();
    } catch (err) {
      mapPointsLoaded = false;   // permite reintentar al reabrir
      console.error('No se pudo cargar el mapa:', err);
    }
  }

  // Dots de la CATEGORÍA actual (ventana alrededor del actual) + contador X/Y.
  function renderDots() {
    const cat = chronicles[idx].category;
    const start = catStart[cat];          // índice de la 1ª de la categoría
    const len = byCat[cat].length;        // efemérides en la categoría
    const pos = idx - start;              // posición dentro de la categoría
    const WINDOW = 15;
    let s = Math.max(0, pos - Math.floor(WINDOW / 2));
    let e = Math.min(len, s + WINDOW);
    s = Math.max(0, e - WINDOW);

    let dots = '';
    for (let i = s; i < e; i++) {
      const cur = i === pos;
      dots += `<button class="progress-dot${cur ? ' active' : ''}" onclick="goTo(${start + i})"${cur ? ' aria-current="true"' : ''} aria-label="Efeméride ${i + 1} de ${len} en ${escapeHtml(cat)}"></button>`;
    }
    document.getElementById('dots').innerHTML =
      `<div class="dots-track">${dots}</div><div class="dots-counter">${pos + 1} / ${len}</div>`;
  }

  function updateUrl() {
    const c = chronicles[idx];
    if (c && c.id != null) history.replaceState(null, '', location.pathname + '?id=' + c.id);
  }

  // Resuelve el índice a partir de la URL: ?id= (preferente) o ?d=fecha/#fecha
  // (compatibilidad con enlaces antiguos). Devuelve -1 si no aplica.
  function deepLinkIdx() {
    const params = new URLSearchParams(location.search);
    const idParam = params.get('id');
    if (idParam) return chronicles.findIndex(c => String(c.id) === idParam);
    const dParam = params.get('d') || location.hash.slice(1);
    if (dParam) return chronicles.findIndex(c => c.event_date === dParam);
    return -1;
  }

  // Tras navegar por acción del usuario, devolvemos el foco a la tarjeta
  // para que el teclado no se pierda al destruirse el botón pulsado.
  function focusContent() {
    document.getElementById('content').focus({ preventScroll: true });
  }

  // Avanza/retrocede una efeméride. Al cruzar el borde de una categoría salta a
  // la siguiente/anterior (la lista plana ya está agrupada por categoría); en
  // los extremos del archivo da la vuelta.
  function next() { idx = (idx + 1) % chronicles.length; render(); focusContent(); }

  function prev() { idx = (idx - 1 + chronicles.length) % chronicles.length; render(); focusContent(); }

  function goTo(i) {
    if (i === idx) return;
    idx = i;
    render();
    focusContent();
  }

  // Salta a la 1ª efeméride de una categoría al azar (distinta a la actual).
  function randomStory() {
    if (categories.length < 2) return;
    const cur = chronicles[idx].category;
    let cat;
    do { cat = categories[Math.floor(Math.random() * categories.length)]; } while (cat === cur);
    idx = catStart[cat];
    render();
    focusContent();
  }

  // Salta a la 1ª efeméride de una categoría concreta.
  function goToCategory(cat) {
    if (catStart[cat] == null) return;
    idx = catStart[cat];
    render();
    focusContent();
  }

  // Abre la efeméride de una fecha concreta (usado por los pines del mapa).
  function openByDate(dateStr) {
    const i = chronicles.findIndex(c => c.event_date === dateStr);
    if (i >= 0) { idx = i; render(); focusContent(); }
  }

  // Compartir: usa el diálogo nativo si existe; si no, copia el enlace.
  async function share() {
    const c = chronicles[idx];
    const url = location.origin + location.pathname + '?id=' + c.id;
    try {
      if (navigator.share) {
        // Solo el enlace: si añadimos `text`, muchas apps comparten el
        // titular e ignoran la URL.
        await navigator.share({ url });
        return;
      }
      await navigator.clipboard.writeText(url);
      flashShare('¡Enlace copiado!');
    } catch (err) {
      if (err && err.name === 'AbortError') return; // el usuario canceló
      try { await navigator.clipboard.writeText(url); flashShare('¡Enlace copiado!'); }
      catch (_) { flashShare('No se pudo copiar'); }
    }
  }

  function flashShare(msg) {
    const btn = document.querySelector('.share-btn');
    if (!btn) return;
    const original = btn.textContent;
    btn.textContent = msg;
    btn.disabled = true;
    setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1500);
  }

  // Teclado: flechas (efeméride), Inicio/Fin (1ª/última de la categoría actual)
  document.addEventListener('keydown', (e) => {
    // Con un modal abierto, solo escuchamos Escape para cerrarlo.
    const mapOpen = !document.getElementById('mapModal').hidden;
    const indexOpen = !document.getElementById('indexModal').hidden;
    const searchOpen = !document.getElementById('searchModal').hidden;
    const timelineOpen = !document.getElementById('timelineModal').hidden;
    if (mapOpen || indexOpen || searchOpen || timelineOpen) {
      if (e.key === 'Escape') { closeMap(); closeIndex(); closeSearch(); closeTimeline(); }
      return;
    }
    if (!chronicles.length) return;
    if (e.key === 'ArrowLeft') prev();
    else if (e.key === 'ArrowRight') next();
    else if (e.key === 'Home') {
      e.preventDefault();
      idx = catStart[chronicles[idx].category];
      render(); focusContent();
    } else if (e.key === 'End') {
      e.preventDefault();
      const cat = chronicles[idx].category;
      idx = catStart[cat] + byCat[cat].length - 1;
      render(); focusContent();
    }
  });

  // Selector de categoría: saltar a su primera efeméride
  document.getElementById('catpick').addEventListener('change', (e) => {
    goToCategory(e.target.value);
  });

  // Índice: al pulsar una categoría, saltar a su primera efeméride
  document.getElementById('indexGrid').addEventListener('click', (e) => {
    const card = e.target.closest('.index-card');
    if (card) { closeIndex(); goToCategory(card.dataset.cat); }
  });

  // Buscador: filtra al escribir; al pulsar un resultado, abre esa efeméride
  document.getElementById('searchInput').addEventListener('input', (e) => runSearch(e.target.value));
  document.getElementById('searchResults').addEventListener('click', (e) => {
    const card = e.target.closest('.index-card');
    if (!card) return;
    closeSearch();
    idx = Number(card.dataset.idx);
    render();
    focusContent();
  });

  // Timeline: al pulsar una efeméride, abrirla
  document.getElementById('timeline').addEventListener('click', (e) => {
    const el = e.target.closest('.tl-entry');
    if (!el) return;
    closeTimeline();
    idx = Number(el.dataset.idx);
    render();
    focusContent();
  });

  // Navegación con gestos (swipe) en móvil
  let touchX = null;
  const cardEl = document.getElementById('card');
  cardEl.addEventListener('touchstart', (e) => {
    // Ignoramos gestos sobre el mini-mapa (pan/zoom) y los multitáctiles (pinch),
    // para no confundirlos con un swipe de navegación.
    if (e.touches.length > 1 || (e.target.closest && e.target.closest('.minimap'))) {
      touchX = null;
      return;
    }
    touchX = e.changedTouches[0].clientX;
  }, { passive: true });
  cardEl.addEventListener('touchend', (e) => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) { dx < 0 ? next() : prev(); }
    touchX = null;
  });

  // Reacciona a atrás/adelante del navegador (o a cambios manuales en la URL)
  window.addEventListener('popstate', () => {
    const i = deepLinkIdx();
    if (i >= 0 && i !== idx) { idx = i; render(); }
  });

  loadChronicles();

  // Leaflet carga con defer: cuando esté listo, pintamos el mini-mapa actual.
  window.addEventListener('load', () => {
    if (chronicles.length) updateMiniMap(chronicles[idx]);
  });

  // PWA: registramos el service worker para instalación y uso offline.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .catch(err => console.warn('Service worker no registrado:', err));
    });
  }
</script>
</body>
</html>
